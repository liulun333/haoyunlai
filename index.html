<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>好运选号机</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:"PingFang SC",sans-serif;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
min-height:100vh;
padding:15px;
color:#333;
overflow-x:hidden;
}

.container{
max-width:520px;
margin:auto;
}

.title{
text-align:center;
color:#fff;
margin-bottom:20px;
}

.title h1{
font-size:34px;
}

.title p{
margin-top:8px;
opacity:.9;
}

.card{
background:#fff;
border-radius:24px;
padding:20px;
margin-bottom:20px;
box-shadow:0 10px 25px rgba(0,0,0,.12);
}

.section-title{
font-size:22px;
font-weight:bold;
margin-bottom:18px;
}

.btn-group{
display:flex;
gap:10px;
margin-bottom:12px;
}

button{
border:none;
border-radius:16px;
padding:14px;
font-size:15px;
cursor:pointer;
font-weight:bold;
transition:.25s;
}

button:active{
transform:scale(.96);
}

.main-btn{
flex:1;
background:#ff5f6d;
color:#fff;
}

.clear-btn{
background:#ddd;
}

.ball-row{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-bottom:10px;
}

.ball{
width:42px;
height:42px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
font-size:18px;
color:#fff;
}

.red{
background:#ff4d6d;
}

.blue{
background:#3a86ff;
}

.record{
background:#fff5f5;
border-radius:18px;
padding:15px;
margin-bottom:12px;
}

.record-top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.record-type{
font-size:18px;
font-weight:bold;
}

.small-btn{
padding:8px 12px;
font-size:14px;
color:#fff;
border-radius:12px;
}

.edit-btn{
background:#ffb703;
}

.delete-btn{
background:#ef476f;
}

.empty{
text-align:center;
padding:20px;
color:#888;
}

.lucky-box{
margin-top:15px;
padding:15px;
border-radius:18px;
text-align:center;
font-weight:bold;
font-size:18px;
color:#fff;
background:linear-gradient(135deg,#ffb347,#ff6b6b);
}

.group-box{
background:#fff5f5;
padding:12px;
border-radius:15px;
margin-bottom:12px;
}

footer{
text-align:center;
color:#fff;
margin-top:10px;
opacity:.9;
}

.small-btn-gen{

width:70px;

background:#ff8a65;

color:white;

border:none;

border-radius:12px;

font-size:13px;

font-weight:bold;

}

</style>
</head>

<body>

<div class="container">

<div class="title">
<h1>🎉 好运选号机</h1>
<p>大乐透 · 双色球 · 好运签语</p>
</div>

<div class="card">

<div class="section-title">
🎲 随机选号
</div>

<div class="btn-group">

<button class="main-btn" onclick="generateDLT()">
大乐透
</button>

<button class="main-btn" onclick="generateSSQ()">
双色球
</button>

</div>

<div class="btn-group">

<button class="small-btn-gen" onclick="generateDLT5()">
5组
</button>

<button class="small-btn-gen" onclick="generateSSQ5()">
5组
</button>
</div>

<div id="resultArea"></div>

</div>

<div class="card">

<div class="record-top">

<div class="section-title">
📒 我的记录
</div>

<button class="clear-btn"
onclick="clearRecords()">
清空
</button>

</div>

<div id="records"></div>

</div>

<footer>
 好运常在 财源滚滚 
</footer>

</div>

<script>

let records=
JSON.parse(
localStorage.getItem("lotteryRecords")
)||[];

const luckyTexts=[

" 好运正在赶来的路上",

"💰 财神爷今天特别关注你",

"🎉 好运值 +100",

"🏆 这组号码特别有眼缘",

"🧧 发财运已启动",

"🌈 今天适合相信直觉",

"💎 财富能量正在聚集",

"🚀 暴富列车即将发车",

"🎯 幸运女神偷偷看了你一眼",

"✨ 好运气开始加载",

"🐲 龙气加身 财运大开",

"🔥 今天运势很旺",

" 钱包正在准备变胖",

"🌟 好运指数持续上升",

"🎁 惊喜可能提前到来",

"🍊 大吉大利",

"💰 今日财气值999+",

"🎉 鸿运当头",

"🌻 心想事成",

"🧨 新财富机会正在靠近"

];

function secureRandom(min,max){

    const arr=new Uint32Array(1);

    crypto.getRandomValues(arr);

    return min+(arr[0]%(max-min+1));

}

function randomNumbers(count,min,max){

    const nums=new Set();

    while(nums.size<count){

        nums.add(
            secureRandom(min,max)
        );

    }

    return [...nums].sort((a,b)=>a-b);

}


function renderBalls(reds,blues){

let html='<div class="ball-row">';

reds.forEach(n=>{

html+=`
<div class="ball red">
${String(n).padStart(2,'0')}
</div>
`;

});

html+='</div>';

html+='<div class="ball-row">';

blues.forEach(n=>{

html+=`
<div class="ball blue">
${String(n).padStart(2,'0')}
</div>
`;

});

html+='</div>';

return html;

}

function luckyText(){

return luckyTexts[
Math.floor(
Math.random()*luckyTexts.length
)
];

}

function showResult(type,reds,blues){

document.getElementById(
"resultArea"
).innerHTML=`

<div style="font-weight:bold;margin-bottom:10px;">
${type}
</div>

${renderBalls(reds,blues)}

<button
class="main-btn"
style="width:100%;margin-top:12px;"
onclick='saveRecord("${type}",
"${reds.join(",")}",
"${blues.join(",")}")'>
❤️ 保存这组号码
</button>

<div class="lucky-box">
${luckyText()}
</div>

`;

}

function generateDLT(){

let red=randomNumbers(5,1,35);
let blue=randomNumbers(2,1,12);

showResult(
"大乐透",
red,
blue
);

}

function generateSSQ(){

let red=randomNumbers(6,1,33);
let blue=randomNumbers(1,1,16);

showResult(
"双色球",
red,
blue
);

}

function uniqueGroupNumbers(
groupCount,
groupSize,
min,
max
){

let pool=[];

while(
pool.length<
groupCount*groupSize
){

let n=
secureRandom(min,max);

if(!pool.includes(n))
pool.push(n);

}

let groups=[];

for(
let i=0;
i<groupCount;
i++
){

groups.push(

pool
.slice(
i*groupSize,
(i+1)*groupSize
)
.sort((a,b)=>a-b)

);

}

return groups;

}

function generateDLT5(){

const reds=
uniqueGroupNumbers(
5,
5,
1,
35
);

let html=
"<h3>🎉 大乐透5组推荐</h3>";

for(let i=0;i<5;i++){

html+=`

<div class="group-box">

${renderBalls(
reds[i],
randomNumbers(2,1,12)
)}

</div>

`;

}

html+=`

<div class="lucky-box">
${luckyText()}
</div>

`;

document.getElementById(
"resultArea"
).innerHTML=html;

}

function generateSSQ5(){

const reds=
uniqueGroupNumbers(
5,
6,
1,
33
);

let html=
"<h3>🎉 双色球5组推荐</h3>";

for(let i=0;i<5;i++){

html+=`

<div class="group-box">

${renderBalls(
reds[i],
randomNumbers(1,1,16)
)}

</div>

`;

}

html+=`

<div class="lucky-box">
${luckyText()}
</div>

`;

document.getElementById(
"resultArea"
).innerHTML=html;

}

function saveRecord(type,reds,blues){

records.unshift({

id:Date.now(),
type,
reds,
blues

});

localStorage.setItem(
"lotteryRecords",
JSON.stringify(records)
);

renderRecords();

alert("保存成功 🎉");

}

function renderRecords(){

const box=
document.getElementById("records");

if(records.length===0){

box.innerHTML=
'<div class="empty">暂无记录</div>';

return;

}

let html='';

records.forEach(item=>{

html+=`

<div class="record">

<div class="record-top">

<div class="record-type">
${item.type}
</div>

<div>

<button
class="small-btn edit-btn"
onclick="editRecord(${item.id})">
编辑
</button>

<button
class="small-btn delete-btn"
onclick="deleteRecord(${item.id})">
删除
</button>

</div>

</div>

${renderBalls(
item.reds.split(',').map(Number),
item.blues.split(',').map(Number)
)}

</div>

`;

});

box.innerHTML=html;

}

function deleteRecord(id){

records=
records.filter(
x=>x.id!==id
);

localStorage.setItem(
"lotteryRecords",
JSON.stringify(records)
);

renderRecords();

}

function editRecord(id){

let item=
records.find(
x=>x.id===id
);

let reds=
prompt(
"修改红球",
item.reds
);

if(reds===null) return;

let blues=
prompt(
"修改蓝球",
item.blues
);

if(blues===null) return;

item.reds=reds;
item.blues=blues;

localStorage.setItem(
"lotteryRecords",
JSON.stringify(records)
);

renderRecords();

}

function clearRecords(){

if(confirm("确定清空所有记录吗？")){

records=[];

localStorage.removeItem(
"lotteryRecords"
);

renderRecords();

}

}

renderRecords();

setInterval(()=>{

const icons=[
"💰",
"🧧",
"💎",
"🎉",
];

const span=
document.createElement("span");

span.innerHTML=
icons[
Math.floor(
Math.random()*icons.length
)
];

span.style.position="fixed";
span.style.left=
Math.random()*100+"vw";
span.style.top="-30px";
span.style.fontSize="24px";
span.style.zIndex="999";

document.body.appendChild(span);

let y=-30;

let timer=setInterval(()=>{

y+=4;

span.style.top=y+"px";

if(y>window.innerHeight){

clearInterval(timer);
span.remove();

}

},20);

},1800);

</script>

</body>
</html>
